<app-navbar></app-navbar>

<div class="page-background">
  <div class="details-container">
    
    <div class="card-header">
      <h2>Doctor Details</h2>
      <p class="subtitle">Comprehensive profile information</p>
    </div>

    <div class="details-content">
      <div class="detail-row">
        <span class="detail-label">Doctor ID</span>
        <span class="detail-value">{{ doctor.doctorId }}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Full Name</span>
        <span class="detail-value">{{ doctor.fullName }}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Specialty</span>
        <span class="detail-value">{{ doctor.specialty }}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Contact Number</span>
        <span class="detail-value">{{ doctor.contactNumber }}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Email</span>
        <span class="detail-value">{{ doctor.email }}</span>
      </div>
      
      <div class="detail-row">
        <span class="detail-label">Experience</span>
        <span class="detail-value">{{ doctor.yearsOfExperience }} Years</span>
      </div>
    </div>

    <button class="action-btn" (click)="logDoctorAttributes()">Log Doctor Attributes</button>
    
    <div class="card-footer">
      <a routerLink="/mediconnect" class="link">Return to Dashboard</a>
    </div>

  </div>
</div>
