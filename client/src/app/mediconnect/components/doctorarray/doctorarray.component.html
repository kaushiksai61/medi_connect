<app-navbar></app-navbar>

<div class="page-background">
  <div class="list-container">
    
    <div class="list-header">
      <h2>Doctor Directory</h2>
      <p class="subtitle">Find and connect with our healthcare professionals</p>
      
      <button class="toggle-btn" (click)="toggleDetails()">
        <svg *ngIf="!showDetails" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        <svg *ngIf="showDetails" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        {{ showDetails ? 'Hide Details' : 'Show Details' }}
      </button>
    </div>

    <div *ngIf="!doctors || doctors.length === 0" class="empty-list">
      <p>No doctors currently available.</p>
    </div>

    <ul class="doctor-list" *ngIf="doctors && doctors.length > 0">
      <li *ngFor="let doctor of doctors" class="doctor-card">
        
        <div class="doctor-card-header">
          <h3 class="doctor-name">{{ doctor.fullName }}</h3>
          <span class="doctor-specialty">{{ doctor.specialty }}</span>
        </div>

        <div *ngIf="showDetails" class="doctor-details">
          <div class="detail-row">
            <span class="detail-label">Contact Number:</span>
            <span class="detail-value">{{ doctor.contactNumber }}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Email:</span>
            <span class="detail-value">{{ doctor.email }}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Experience:</span>
            <span class="detail-value">{{ doctor.yearsOfExperience }} Years</span>
          </div>
        </div>
        
      </li>
    </ul>

  </div>
</div>
